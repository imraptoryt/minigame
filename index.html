<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PC-9000</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at center, #1a0a1a, #050505);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* === TÉLÉPHONE === */
  #pc-frame {
    width: min(420px, 96vw);
    height: min(900px, 96vh);
    background: linear-gradient(135deg, #1c1c22 0%, #0a0a0d 50%, #1c1c22 100%);
    border-radius: 46px;
    padding: 8px;
    box-shadow:
      inset 0 0 0 1.5px #3a3a40,
      inset 0 1px 2px rgba(255,255,255,0.06),
      0 20px 60px rgba(0,0,0,0.85),
      0 0 100px rgba(255,80,150,0.08);
    position: relative;
    z-index: 2;
  }
  /* Bouton volume */
  #pc-frame::before {
    content: '';
    position: absolute;
    left: -3px; top: 130px;
    width: 4px; height: 90px;
    background: linear-gradient(90deg, #0a0a0d, #2a2a30 50%, #0a0a0d);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 110px 0 -2px #2a2a30, 0 110px 0 #0a0a0d;
  }
  /* Bouton power */
  #pc-frame::after {
    content: '';
    position: absolute;
    right: -3px; top: 160px;
    width: 4px; height: 110px;
    background: linear-gradient(-90deg, #0a0a0d, #2a2a30 50%, #0a0a0d);
    border-radius: 0 2px 2px 0;
  }

  /* Dynamic island */
  .phone-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 30px;
    background: #000;
    border-radius: 18px;
    z-index: 99992;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
  }
  .phone-island::after {
    content: '';
    position: absolute;
    right: 14px;
    width: 7px; height: 7px;
    background: #0a0a18;
    border-radius: 50%;
    box-shadow: inset 0 0 2px rgba(80,80,120,0.4);
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    z-index: 9988;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    pointer-events: none;
    letter-spacing: 0.3px;
  }
  .status-bar .indicators {
    display: flex; gap: 6px;
    font-size: 13px;
    align-items: center;
  }
  .status-bar .battery {
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 3px;
    padding: 0 3px;
    font-size: 9px;
    font-weight: bold;
    position: relative;
    height: 12px;
    display: inline-flex;
    align-items: center;
    background: linear-gradient(90deg, #fff 0% 80%, transparent 80%);
    color: #000;
    min-width: 24px;
    justify-content: center;
  }
  .status-bar .battery::after {
    content: '';
    position: absolute;
    right: -3px; top: 3px;
    width: 2px; height: 6px;
    background: rgba(255,255,255,0.7);
    border-radius: 0 1px 1px 0;
  }

  /* Home indicator */
  .home-bar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 5px;
    background: rgba(255,255,255,0.85);
    border-radius: 3px;
    z-index: 9991;
  }

  /* Fissure écran (subtile) */
  .screen-crack {
    position: absolute;
    top: 90px; right: 32px;
    width: 150px;
    height: 150px;
    pointer-events: none;
    z-index: 99995;
    opacity: 0.55;
  }

  #external-timer {
    display: none;
    position: absolute;
    top: 52px; left: 10px; right: 10px;
    background: rgba(40,0,0,0.95);
    color: #ff3030;
    padding: 10px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    border: 1px solid #800;
    border-radius: 14px;
    box-shadow: 0 4px 16px rgba(255,0,0,0.5);
    letter-spacing: 2px;
    text-shadow: 0 0 6px #ff3030;
    text-align: center;
    z-index: 99990;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* Screen */
  #screen {
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 70% 50% at 80% 110%, rgba(236,72,153,0.45), transparent 55%),
      radial-gradient(ellipse 60% 50% at 20% -10%, rgba(99,102,241,0.4), transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(168,85,247,0.18), transparent 60%),
      linear-gradient(160deg, #0a0a1a 0%, #1a0a2e 40%, #2a0a3e 70%, #1a0a2a 100%);
    background-attachment: local;
    border-radius: 38px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
  }
  /* Suppression scanlines + vignette */
  #screen::before,
  #screen::after { display: none; }
  #screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px,
      transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 99999;
  }
  #screen::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 99998;
  }

  /* Watermark discret sur le bureau */
  .desktop-wm {
    position: absolute;
    bottom: 50px; right: 20px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    letter-spacing: 4px;
    font-family: 'Courier New', monospace;
    text-align: right;
    line-height: 1.4;
    pointer-events: none;
    user-select: none;
  }

  #desktop {
    position: absolute;
    inset: 0;
    padding: 14px;
    z-index: 1;
  }

  #desktop {
    position: absolute;
    top: 50px; left: 0; right: 0; bottom: 26px;
    padding: 20px 16px 10px;
    z-index: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 6px;
    align-content: start;
  }

  .desktop-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    color: white;
    font-size: 10px;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    text-align: center;
    user-select: none;
    transition: transform 0.12s;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .desktop-icon:hover { transform: scale(1.04); }
  .desktop-icon:active { transform: scale(0.92); }
  .desktop-icon .ico {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #f8f8fb 0%, #c8c8d0 100%);
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 5px;
    box-shadow:
      0 4px 10px rgba(0,0,0,0.35),
      inset 0 -2px 3px rgba(0,0,0,0.08),
      inset 0 1px 1px rgba(255,255,255,0.6);
  }
  /* Couleurs spécifiques pour certaines apps (style iOS) */
  .desktop-icon[data-app="notes"] .ico    { background: linear-gradient(135deg, #fff5b0, #fcd34d); }
  .desktop-icon[data-app="calc"] .ico     { background: linear-gradient(135deg, #555, #1a1a1a); color: #fff; }
  .desktop-icon[data-app="files"] .ico    { background: linear-gradient(135deg, #60a5fa, #2563eb); }
  .desktop-icon[data-app="snake"] .ico    { background: linear-gradient(135deg, #86efac, #16a34a); }
  .desktop-icon[data-app="paint"] .ico    { background: linear-gradient(135deg, #fda4af, #e11d48); }
  .desktop-icon[data-app="music"] .ico    { background: linear-gradient(135deg, #f0abfc, #c026d3); }
  .desktop-icon[data-app="photos"] .ico   { background: linear-gradient(135deg, #fbbf24, #ea580c, #ec4899); }
  .desktop-icon[data-app="memory"] .ico   { background: linear-gradient(135deg, #a78bfa, #6d28d9); }
  .desktop-icon[data-app="minesweeper"] .ico { background: linear-gradient(135deg, #6b7280, #1f2937); }
  .desktop-icon[data-app="pong"] .ico     { background: linear-gradient(135deg, #fde047, #ca8a04); }
  .desktop-icon[data-app="morpion"] .ico  { background: linear-gradient(135deg, #67e8f9, #0891b2); }
  .desktop-icon[data-app="taupes"] .ico   { background: linear-gradient(135deg, #d2b48c, #8b4513); }
  .desktop-icon[data-app="darknet"] .ico  { background: linear-gradient(135deg, #18181b, #450a0a); color: #ff3030; box-shadow: 0 4px 14px rgba(255,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2); }

  /* Windows = applications phone en plein écran */
  .window {
    position: absolute !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
    background: #f2f2f7;
    border: none;
    border-radius: 0;
    min-width: 0; min-height: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: win-open 0.22s ease-out;
  }
  @keyframes win-open {
    from { transform: scale(1.05); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .window.maximized { /* déjà plein écran par défaut */ }

  .window-title {
    background: linear-gradient(180deg, #f8f8fa, #e8e8eb);
    color: #000;
    padding: 0 14px;
    padding-top: 44px; /* sous la status bar */
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    cursor: default;
    user-select: none;
    height: 88px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    font-family: -apple-system, system-ui, sans-serif;
  }
  .window-title.inactive { background: linear-gradient(180deg, #f8f8fa, #e8e8eb); }
  .window-title > span:first-child {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    padding: 0 12px;
  }
  .window-controls {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    margin-left: auto;
  }
  .window-controls button[data-action="min"],
  .window-controls button[data-action="max"] { display: none; }
  .window-controls button[data-action="close"] {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(120,120,128,0.18);
    border: none;
    color: #000;
    font-size: 16px;
    font-weight: bold;
    padding: 0;
    cursor: pointer;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .window-controls button[data-action="close"]:active {
    background: rgba(120,120,128,0.35);
    transform: scale(0.92);
  }

  .window-body {
    flex: 1;
    background: #f2f2f7;
    overflow: auto;
    position: relative;
    padding: 0;
  }
  .window-resize { display: none !important; }

  /* Apps DarkNet : header sombre */
  .darknet-window .window-title {
    background: linear-gradient(180deg, #1a0a0a, #2a0505) !important;
    color: #ff5050;
    border-bottom: 1px solid #500;
  }
  .darknet-window .window-controls button[data-action="close"] {
    background: rgba(255,80,80,0.18);
    color: #ff9090;
  }
  .darknet-window .window-controls button[data-action="close"]:active {
    background: rgba(255,80,80,0.35);
  }
  .darknet-window .window-body {
    background: #000 !important;
  }

  /* Taskbar caché en mode phone */
  #taskbar { display: none !important; }

  /* Taskbar */
  #taskbar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 28px;
    background: #c0c0c0;
    border-top: 2px solid #fff;
    display: flex;
    align-items: center;
    padding: 2px 4px;
    z-index: 9000;
    gap: 4px;
  }
  .start-button {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    padding: 1px 8px;
    font-weight: bold;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  .start-button:active {
    border-color: #404040 #fff #fff #404040;
  }
  #taskbar-items {
    display: flex;
    gap: 3px;
    flex: 1;
    overflow: hidden;
  }
  .taskbar-item {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    padding: 1px 8px;
    font-size: 10px;
    cursor: pointer;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Courier New', monospace;
  }
  .taskbar-item.active {
    border-color: #404040 #fff #fff #404040;
    background: #a0a0a0;
  }
  #taskbar-clock {
    border: 1px solid;
    border-color: #404040 #fff #fff #404040;
    padding: 2px 8px;
    font-size: 11px;
  }

  /* Generic content */
  .pad { padding: 10px; }
  h3.app-title { margin: 0 0 8px 0; font-size: 13px; }

  /* Notes */
  .notes-area {
    width: 100%; height: 100%;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    background: white;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 8px;
    resize: none;
    outline: none;
  }

  /* Calculator */
  .calc { padding: 8px; font-family: 'Courier New', monospace; }
  .calc-display {
    background: #aabb88; color: #000;
    padding: 6px 10px;
    text-align: right;
    font-size: 20px;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    margin-bottom: 8px;
    min-height: 24px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .calc-grid button {
    padding: 10px;
    font-size: 14px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }
  .calc-grid button:active {
    border-color: #404040 #fff #fff #404040;
  }

  /* Snake */
  .snake-info {
    display: flex; justify-content: space-between;
    padding: 6px 8px;
    background: #000080; color: white;
    font-size: 12px;
    font-weight: bold;
  }
  .snake-canvas-wrap {
    display: flex; justify-content: center; align-items: center;
    background: #001;
    padding: 8px;
  }
  #snakeCanvas {
    background: #000;
    border: 2px solid #404040;
    image-rendering: pixelated;
  }

  /* Files */
  .files-list {
    background: white;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    padding: 4px;
    height: calc(100% - 8px);
    overflow-y: auto;
    font-size: 12px;
  }
  .file-row {
    display: flex; align-items: center;
    gap: 8px;
    padding: 4px;
    cursor: pointer;
  }
  .file-row:hover { background: #000080; color: white; }

  /* Darknet */
  .darknet-window .window-title {
    background: linear-gradient(90deg, #200, #800) !important;
  }
  .darknet-window .window-body {
    background: #000 !important;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 0;
  }

  /* Darknet lock screen */
  .dn-lock {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .dn-lock h2 {
    color: #f00;
    text-shadow: 0 0 8px #f00;
    letter-spacing: 4px;
    margin: 8px 0 16px;
    font-size: 18px;
  }
  .dn-lock-ascii {
    color: #c00;
    font-size: 9px;
    line-height: 1.0;
    letter-spacing: -0.5px;
    white-space: pre;
    font-family: 'Courier New', Consolas, monospace;
    font-weight: bold;
    text-shadow:
      0 0 4px #f00,
      0 0 10px rgba(255,0,0,0.6);
    margin-bottom: 16px;
    animation: lock-pulse 2s infinite alternate;
  }
  @keyframes lock-pulse {
    from { text-shadow: 0 0 3px #f00, 0 0 8px rgba(255,0,0,0.5); filter: brightness(0.9); }
    to { text-shadow: 0 0 6px #f00, 0 0 16px rgba(255,0,0,0.8); filter: brightness(1.1); }
  }
  .dn-input {
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    width: 180px;
  }
  .dn-submit {
    margin-top: 14px;
    background: #0a0a0a;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 6px 16px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 2px;
  }
  .dn-submit:hover { background: #030; }
  .dn-error {
    color: #f00; margin-top: 10px;
    font-size: 12px;
    height: 16px;
  }

  /* Skull loading */
  .skull-loading {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 20px;
    overflow: hidden;
  }
  .skull-art {
    color: #0f0;
    font-size: 10px;
    line-height: 1.0;
    letter-spacing: -0.5px;
    white-space: pre;
    font-family: 'Courier New', Consolas, monospace;
    text-shadow:
      0 0 4px #0f0,
      0 0 10px #0f0,
      0 0 20px rgba(0,255,0,0.5);
    animation: skull-glow 1.8s infinite alternate;
    font-weight: bold;
  }
  @keyframes skull-glow {
    from {
      text-shadow: 0 0 3px #0f0, 0 0 8px #0f0, 0 0 16px rgba(0,255,0,0.4);
      transform: scale(1);
      filter: brightness(0.9);
    }
    to {
      text-shadow: 0 0 6px #0f0, 0 0 16px #0f0, 0 0 32px rgba(0,255,0,0.7);
      transform: scale(1.03);
      filter: brightness(1.15);
    }
  }
  .skull-text {
    margin-top: 16px;
    font-size: 12px;
    color: #0f0;
    min-height: 80px;
    width: 80%;
    text-align: center;
  }
  .skull-text .line { opacity: 0; animation: fadein 0.3s forwards; }
  @keyframes fadein { to { opacity: 1; } }
  .cursor { animation: blink 0.8s infinite; }

  /* Wipe skull */
  .skull-art.evil {
    color: #ff2020;
    text-shadow:
      0 0 4px #f00,
      0 0 12px #f00,
      0 0 24px rgba(255,0,0,0.6);
    animation: skull-evil 0.5s infinite alternate;
  }
  @keyframes skull-evil {
    from {
      text-shadow: 0 0 4px #f00, 0 0 10px #f00, 0 0 20px rgba(255,0,0,0.5);
      transform: scale(1) rotate(-0.5deg);
      filter: brightness(1) hue-rotate(0deg);
    }
    to {
      text-shadow: 0 0 8px #f00, 0 0 22px #f00, 0 0 40px rgba(255,0,0,0.9);
      transform: scale(1.06) rotate(0.5deg);
      filter: brightness(1.3) hue-rotate(-10deg);
    }
  }
  .data-stream {
    color: #f00;
    font-size: 10px;
    white-space: pre;
    margin-top: 10px;
    max-height: 120px;
    overflow: hidden;
    width: 90%;
    text-align: left;
    font-family: 'Courier New', monospace;
  }

  /* Messenger */
  .messenger { display: flex; height: 100%; background: #1a1a1a; color: #0f0; }
  .msg-sidebar {
    width: 180px;
    background: #0d0d0d;
    border-right: 1px solid #0f0;
    overflow-y: auto;
  }
  .msg-header {
    background: #200;
    padding: 6px 10px;
    color: #f55;
    font-weight: bold;
    font-size: 11px;
    border-bottom: 1px solid #800;
    letter-spacing: 2px;
  }
  .chat-item {
    padding: 8px 10px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    font-size: 12px;
  }
  .chat-item:hover { background: #1a1a1a; }
  .chat-item.active { background: #002000; }
  .chat-name { color: #0f0; font-weight: bold; }
  .chat-preview {
    color: #555;
    font-size: 10px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-locked::after { content: ' 🔒'; }
  .msg-main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
  .msg-chat-header {
    background: #200;
    padding: 6px 12px;
    font-size: 12px;
    color: #f55;
    border-bottom: 1px solid #800;
  }
  .msg-messages {
    flex: 1; overflow-y: auto;
    padding: 10px;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg-empty {

<script>
/* ===========================================================
   ÉTAT GLOBAL
   =========================================================== */
const state = {
  darknetUnlocked: false,
  chatsUnlocked: {},     // chatId -> true
  imageViewed: false,
  wipeTimer: null,
  wipeRemaining: 60,
  zIndex: 100,
  windows: {},           // id -> element
  activeWindow: null,
  skipEnabled: false,    // activable via la commande cachée "skip"
};

const DARKNET_CODE = '4271'; // ← code caché dans Notes

/* ===========================================================
   PERSISTANCE (wipe)
   =========================================================== */
function isWiped() { return localStorage.getItem('dn_wiped') === '1'; }
function setWiped(v) {
  if (v) localStorage.setItem('dn_wiped', '1');
  else localStorage.removeItem('dn_wiped');
}

/* ===========================================================
   HORLOGE
   =========================================================== */
function updateClock() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const tb = document.getElementById('taskbar-clock');

  if (sb) sb.textContent = `${h}:${m}`;
}

/* ===========================================================
   ICÔNES DESKTOP
   =========================================================== */
const APPS = [
  { id: 'notes',       name: 'Notes',     icon: '📝' },
  { id: 'calc',        name: 'Calc',      icon: '🧮' },
  { id: 'files',       name: 'Fichiers',  icon: '📁' },

}
renderDesktop();

/* ===========================================================
   SYSTÈME DE FENÊTRES
   =========================================================== */
function makeWindow({ id, title, body, width = 520, height = 380, x, y, darknet = false, onClose = null }) {
  if (state.windows[id]) {
    focusWindow(state.windows[id]);
    return state.windows[id];
  }
  const win = document.createElement('div');
  win.className = 'window' + (darknet ? ' darknet-window' : '');
  win.dataset.id = id;
  win.style.width = width + 'px';
  win.style.height = height + 'px';
  if (x === undefined) x = 60 + Math.random() * 80;
  if (y === undefined) y = 30 + Math.random() * 60;
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.zIndex = ++state.zIndex;

  win.innerHTML = `
    <div class="window-title">
      <span>${title}</span>
      <div class="window-controls">
        <button data-action="min">_</button>
        <button data-action="max">▢</button>
        <button data-action="close">✕</button>
      </div>
    </div>
    <div class="window-body"></div>
    <div class="window-resize"></div>
  `;
  win.querySelector('.window-body').appendChild(body);

  // Title drag
  const titleBar = win.querySelector('.window-title');
  let dragOffset = null;
  titleBar.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    if (win.classList.contains('maximized')) return;
    focusWindow(win);
    const rect = win.getBoundingClientRect();
    const containerRect = document.getElementById('screen').getBoundingClientRect();
    dragOffset = {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top,
      cx: containerRect.left,
      cy: containerRect.top
    };
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragOffset || !win.parentElement) return;
    const nx = Math.max(0, e.clientX - dragOffset.x - dragOffset.cx);
    const ny = Math.max(0, e.clientY - dragOffset.y - dragOffset.cy);
    win.style.left = nx + 'px';
    win.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => { dragOffset = null; });

  // Resize
  const resize = win.querySelector('.window-resize');
  let resizing = null;
  resize.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    if (win.classList.contains('maximized')) return;
    resizing = { x: e.clientX, y: e.clientY, w: win.offsetWidth, h: win.offsetHeight };
  });
  document.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    win.style.width = Math.max(260, resizing.w + (e.clientX - resizing.x)) + 'px';
    win.style.height = Math.max(180, resizing.h + (e.clientY - resizing.y)) + 'px';
  });
  document.addEventListener('mouseup', () => { resizing = null; });

  // Controls
  win.querySelector('[data-action="close"]').onclick = () => {
    if (onClose) onClose();
    win.remove();
    delete state.windows[id];
    renderTaskbar();
  };
  win.querySelector('[data-action="max"]').onclick = () => {
    win.classList.toggle('maximized');
  };
  win.querySelector('[data-action="min"]').onclick = () => {
    win.style.display = 'none';
    renderTaskbar();
  };
  win.addEventListener('mousedown', () => focusWindow(win));

  document.getElementById('windows-container').appendChild(win);
  state.windows[id] = win;
  focusWindow(win);
  renderTaskbar();
  return win;
}

function focusWindow(win) {
  Object.values(state.windows).forEach(w => {
    w.querySelector('.window-title').classList.add('inactive');
  });
  win.querySelector('.window-title').classList.remove('inactive');
  win.style.zIndex = ++state.zIndex;
  win.style.display = '';
  state.activeWindow = win;
  renderTaskbar();
}

function renderTaskbar() {
  const tb = document.getElementById('taskbar-items');
  tb.innerHTML = '';
  Object.entries(state.windows).forEach(([id, win]) => {
    const item = document.createElement('div');
    item.className = 'taskbar-item' + (win === state.activeWindow && win.style.display !== 'none' ? ' active' : '');
    item.textContent = win.querySelector('.window-title span').textContent;
    item.onclick = () => {
      if (win.style.display === 'none') { win.style.display = ''; focusWindow(win); }
      else if (state.activeWindow === win) { win.style.display = 'none'; renderTaskbar(); }
      else { focusWindow(win); }
    };
    tb.appendChild(item);
  });
}

/* ===========================================================
   APP: CALCULATRICE
   =========================================================== */
function openCalc() {
  const body = document.createElement('div');
  body.className = 'calc';
  body.innerHTML = `
    <div class="calc-display" id="calcDisp">0</div>
    <div class="calc-grid">
      ${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C','±','%',''].map(k =>
        k === '' ? '<div></div>' : `<button data-k="${k}">${k}</button>`
      ).join('')}
    </div>
  `;
  let cur = '0', prev = null, op = null, replace = true;
  body.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      const k = b.dataset.k;
      const disp = body.querySelector('#calcDisp');
      if (k === 'C') { cur = '0'; prev = null; op = null; replace = true; }
      else if (k === '±') { cur = String(-parseFloat(cur)); }
      else if (k === '%') { cur = String(parseFloat(cur)/100); }
      else if ('+-*/'.includes(k)) {
        if (prev !== null && op && !replace) {
          cur = String(compute(parseFloat(prev), parseFloat(cur), op));
        }
        prev = cur; op = k; replace = true;
      }
      else if (k === '=') {
        if (prev !== null && op) {
          cur = String(compute(parseFloat(prev), parseFloat(cur), op));
          prev = null; op = null; replace = true;
        }
      }
      else {
        if (replace) { cur = (k === '.' ? '0.' : k); replace = false; }
        else { if (k === '.' && cur.includes('.')) return; cur += k; }
      }
      disp.textContent = cur;
    };
  });
  function compute(a, b, o) {
    if (o === '+') return a + b;
    if (o === '-') return a - b;
    if (o === '*') return a * b;
    if (o === '/') return b === 0 ? 'ERR' : a / b;
  }
  makeWindow({ id: 'calc', title: 'Calculatrice', body, width: 240, height: 320 });
}

/* ===========================================================
   APP: SNAKE
   =========================================================== */
function openSnake() {
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="snake-info">
      <span>Score: <span id="snakeScore">0</span></span>
      <span>Flèches ← ↑ ↓ →</span>
    </div>
    <div class="snake-canvas-wrap"><canvas id="snakeCanvas" width="320" height="320"></canvas></div>
  `;
  setTimeout(() => initSnake(body), 50);
  makeWindow({ id: 'snake', title: 'Snake', body, width: 360, height: 400, onClose: () => { if (window._snakeStop) window._snakeStop(); } });
}
function initSnake(container) {
  const c = container.querySelector('#snakeCanvas');
  const scoreEl = container.querySelector('#snakeScore');
  if (!c) return;
  const ctx = c.getContext('2d');
  const SIZE = 20, COLS = 16;
  let snake = [{x: 8, y: 8}];
  let dir = {x: 1, y: 0};
  let food = randFood();
  let score = 0, alive = true;
  function randFood() {
    while(true) {
      const f = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
      if (!snake.some(s => s.x===f.x && s.y===f.y)) return f;
    }
  }
  const key = (e) => {
    if (e.key === 'ArrowUp' && dir.y !== 1) dir = {x:0,y:-1};
    else if (e.key === 'ArrowDown' && dir.y !== -1) dir = {x:0,y:1};
    else if (e.key === 'ArrowLeft' && dir.x !== 1) dir = {x:-1,y:0};
    else if (e.key === 'ArrowRight' && dir.x !== -1) dir = {x:1,y:0};
  };
  document.addEventListener('keydown', key);
  const loop = setInterval(() => {
    if (!alive) return;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=COLS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      alive = false;
      ctx.fillStyle = '#f00'; ctx.font = '20px monospace';
      ctx.fillText('GAME OVER', 90, 160);
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++; scoreEl.textContent = score; food = randFood();
    } else snake.pop();
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,320);
    ctx.fillStyle = '#0f0';
    snake.forEach(s => ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2));
    ctx.fillStyle = '#f00';
    ctx.fillRect(food.x*SIZE+2, food.y*SIZE+2, SIZE-4, SIZE-4);
  }, 130);
  window._snakeStop = () => { clearInterval(loop); document.removeEventListener('keydown', key); };
}

/* ===========================================================
   APP: DÉMINEUR
   =========================================================== */
function openMinesweeper() {
  const ROWS = 10, COLS = 10, MINES = 15;
  const grid = [], revealed = [], flagged = [];
  for (let r = 0; r < ROWS; r++) {
    grid.push(new Array(COLS).fill(0));
    revealed.push(new Array(COLS).fill(false));
    flagged.push(new Array(COLS).fill(false));
  }
  // place mines
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random()*ROWS), c = Math.floor(Math.random()*COLS);
    if (grid[r][c] !== -1) { grid[r][c] = -1; placed++; }
  }
  // count adjacents
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (grid[r][c] === -1) continue;
    let n = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && grid[nr][nc] === -1) n++;
    }
    grid[r][c] = n;
  }
  let gameOver = false, won = false, flagsLeft = MINES;

  const body = document.createElement('div');
  body.style.padding = '8px';
  body.style.background = '#c0c0c0';
  body.innerHTML = `
    <div style="background:#000;color:#f00;font-family:monospace;font-weight:bold;display:flex;justify-content:space-between;padding:4px 10px;margin-bottom:6px;border:2px inset #c0c0c0;font-size:14px;">
      <span>💣 <span id="msFlags">${flagsLeft}</span></span>
      <button id="msReset" style="background:#c0c0c0;border:2px outset #fff;cursor:pointer;font-size:14px;width:30px;height:24px;">🙂</button>
      <span>⏱ <span id="msTime">0</span></span>
    </div>
    <div id="msGrid" style="display:grid;grid-template-columns:repeat(${COLS},24px);gap:1px;background:#808080;padding:2px;border:2px inset #c0c0c0;"></div>
    <div style="font-size:10px;color:#444;margin-top:6px;text-align:center;font-family:monospace;">Clic = révéler · Clic droit = drapeau</div>
  `;
  let seconds = 0;
  const timeInt = setInterval(() => {
    if (!gameOver) { seconds++; body.querySelector('#msTime').textContent = seconds; }
  }, 1000);

  const win = makeWindow({ id: 'minesweeper', title: '💣 Démineur', body, width: 280, height: 340,
    onClose: () => clearInterval(timeInt) });

  body.querySelector('#msReset').onclick = () => { win.querySelector('[data-action="close"]').click(); openMinesweeper(); };

  const gridEl = body.querySelector('#msGrid');
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    cells.push([]);
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.dataset.r = r; cell.dataset.c = c;
      cell.style.cssText = 'width:24px;height:24px;background:#c0c0c0;border:2px outset #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:monospace;font-weight:bold;font-size:13px;user-select:none;';
      cell.oncontextmenu = (e) => {
        e.preventDefault();
        if (gameOver || revealed[r][c]) return;
        flagged[r][c] = !flagged[r][c];
        cell.textContent = flagged[r][c] ? '🚩' : '';
        flagsLeft += flagged[r][c] ? -1 : 1;
        body.querySelector('#msFlags').textContent = flagsLeft;
      };
      cell.onclick = () => {
        if (gameOver || revealed[r][c] || flagged[r][c]) return;
        reveal(r, c);
        checkWin();
      };
      gridEl.appendChild(cell);
      cells[r].push(cell);
    }
  }
  function reveal(r, c) {
    if (r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c]) return;
    revealed[r][c] = true;
    const cell = cells[r][c];
    cell.style.border = '1px solid #888';
    cell.style.background = '#bbb';
    if (grid[r][c] === -1) {
      cell.textContent = '💣';
      cell.style.background = '#f44';
      gameOver = true;
      body.querySelector('#msReset').textContent = '😵';
      // reveal all mines
      for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
        if (grid[rr][cc] === -1 && !revealed[rr][cc]) {
          cells[rr][cc].textContent = '💣';
          cells[rr][cc].style.border = '1px solid #888';
        }
      }
    } else if (grid[r][c] > 0) {
      const colors = ['', '#0000ff', '#008000', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];
      cell.style.color = colors[grid[r][c]];
      cell.textContent = grid[r][c];
    } else {
      // auto-reveal neighbors
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr || dc) reveal(r+dr, c+dc);
      }
    }
  }
  function checkWin() {
    let unrevealed = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (!revealed[r][c] && grid[r][c] !== -1) unrevealed++;
    }
    if (unrevealed === 0) {
      won = true; gameOver = true;
      body.querySelector('#msReset').textContent = '😎';
    }
  }
}

function initPong(body, win) {
  const c = body.querySelector('#pgCanvas');
  const ctx = c.getContext('2d');
  const W = 400, H = 280;
  let py = H/2 - 30, ay = H/2 - 30;
  const PH = 60, PW = 8;
  let bx = W/2, by = H/2, bvx = 3.5 * (Math.random() < 0.5 ? 1 : -1), bvy = 2.5 * (Math.random() < 0.5 ? 1 : -1);
  let pl = 0, ar = 0, paused = false;
  const keys = {};
  const onKey = (e) => {
    if (e.key === 'ArrowUp') keys.up = (e.type === 'keydown');
    if (e.key === 'ArrowDown') keys.down = (e.type === 'keydown');
  };
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);
  c.onmousemove = (e) => {
    const r = c.getBoundingClientRect();
    py = e.clientY - r.top - PH/2;
    py = Math.max(0, Math.min(H - PH, py));
  };
  const loop = setInterval(() => {
    if (paused) return;
    if (keys.up) py = Math.max(0, py - 4);
    if (keys.down) py = Math.min(H - PH, py + 4);
    // AI
    const targetY = by - PH/2;
    if (ay + 3 < targetY) ay += 3;
    else if (ay - 3 > targetY) ay -= 3;
    ay = Math.max(0, Math.min(H - PH, ay));
    // ball
    bx += bvx; by += bvy;
    if (by < 4 || by > H-4) bvy *= -1;
    // collide left paddle
    if (bx < PW + 6 && by > py && by < py + PH) { bvx = Math.abs(bvx) * 1.05; bvy += (by - (py+PH/2)) * 0.05; }
    // collide right
    if (bx > W - PW - 6 && by > ay && by < ay + PH) { bvx = -Math.abs(bvx) * 1.05; bvy += (by - (ay+PH/2)) * 0.05; }
    // out
    if (bx < 0) { ar++; reset(1); }
    else if (bx > W) { pl++; reset(-1); }
    // draw
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#444'; ctx.setLineDash([6,6]); ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#fff';
    ctx.fillRect(4, py, PW, PH);
    ctx.fillRect(W-PW-4, ay, PW, PH);
    ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2); ctx.fill();
    body.querySelector('#pgL').textContent = pl;
    body.querySelector('#pgR').textContent = ar;
    if (pl >= 5 || ar >= 5) {
      paused = true;
      body.querySelector('#pgMsg').textContent = pl >= 5 ? '★ Tu gagnes !' : 'CPU gagne...';
    }
  }, 16);
  function reset(dir) {
    bx = W/2; by = H/2;
    bvx = 3.5 * dir;
    bvy = 2.5 * (Math.random() < 0.5 ? 1 : -1);
  }
  window._pongStop = () => {
    clearInterval(loop);
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
  };
}

/* ===========================================================
   APP: MORPION (Tic-tac-toe) avec IA
   =========================================================== */
function openMorpion() {
  let board = ['','','','','','','','',''];
  let gameOver = false, scoreP = 0, scoreAI = 0, draws = 0;

  const body = document.createElement('div');
  body.style.padding = '10px';
  body.style.background = '#c0c0c0';
  body.innerHTML = `
    <div style="text-align:center;font-family:monospace;font-size:12px;margin-bottom:8px;">
      Toi (X): <b id="mpP">0</b> · CPU (O): <b id="mpA">0</b> · Nuls: <b id="mpD">0</b>
    </div>
    <div id="mpGrid" style="display:grid;grid-template-columns:repeat(3,80px);grid-template-rows:repeat(3,80px);gap:4px;justify-content:center;background:#000080;padding:4px;width:fit-content;margin:0 auto;"></div>
    <div id="mpMsg" style="text-align:center;font-family:monospace;font-size:12px;margin-top:8px;min-height:16px;font-weight:bold;">À toi de jouer</div>
    <div style="text-align:center;margin-top:6px;"><button id="mpReset" style="padding:4px 12px;font-family:monospace;cursor:pointer;border:2px outset #fff;background:#c0c0c0;">Nouvelle partie</button></div>
  `;
  const grid = body.querySelector('#mpGrid');
  const cells = [];
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.style.cssText = 'background:#c0c0c0;border:2px outset #fff;display:flex;align-items:center;justify-content:center;font-size:42px;font-family:Courier New,monospace;font-weight:bold;cursor:pointer;user-select:none;';
    c.onclick = () => play(i);
    grid.appendChild(c);
    cells.push(c);
  }
  body.querySelector('#mpReset').onclick = newGame;

  function newGame() {
    board = ['','','','','','','','',''];
    cells.forEach(c => { c.textContent = ''; c.style.color = ''; c.style.background = '#c0c0c0'; });
    gameOver = false;
    body.querySelector('#mpMsg').textContent = 'À toi de jouer';
  }
  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = 'X';
    cells[i].textContent = 'X';
    cells[i].style.color = '#0066cc';
    if (check('X')) { end('Tu gagnes ! ★'); scoreP++; return; }
    if (full()) { end('Égalité.'); draws++; return; }
    // AI play
    setTimeout(() => {
      const move = bestMove();
      board[move] = 'O';
      cells[move].textContent = 'O';
      cells[move].style.color = '#cc0000';
      if (check('O')) { end('CPU gagne.'); scoreAI++; return; }
      if (full()) { end('Égalité.'); draws++; return; }
    }, 250);
  }
  function check(p) {
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const w of wins) if (board[w[0]]===p && board[w[1]]===p && board[w[2]]===p) {
      w.forEach(idx => cells[idx].style.background = '#aaffaa');
      return true;
    }
    return false;
  }
  function full() { return board.every(x => x); }
  function end(msg) {
    gameOver = true;
    body.querySelector('#mpMsg').textContent = msg;
    body.querySelector('#mpP').textContent = scoreP;
    body.querySelector('#mpA').textContent = scoreAI;
    body.querySelector('#mpD').textContent = draws;
  }
  // Minimax simple
  function bestMove() {
    let bestScore = -Infinity, move = 0;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const s = minimax(board, 0, false);
        board[i] = '';
        if (s > bestScore) { bestScore = s; move = i; }
      }
    }
    return move;
  }
  function minimax(b, depth, isMax) {
    if (winsFor(b, 'O')) return 10 - depth;
    if (winsFor(b, 'X')) return depth - 10;
    if (b.every(x => x)) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = ''; }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = ''; }
      return best;
    }
  }
  function winsFor(b, p) {
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return wins.some(w => b[w[0]]===p && b[w[1]]===p && b[w[2]]===p);
  }

  makeWindow({ id: 'morpion', title: '⭕ Morpion', body, width: 320, height: 400 });
}

function openTaupes() {
  const body = document.createElement('div');
  body.style.padding = '10px';
  body.style.background = '#5a3a1a';
  body.innerHTML = `
    <div style="font-family:monospace;font-size:13px;color:#fff;display:flex;justify-content:space-between;background:#3a2010;padding:6px 12px;border:2px inset #5a3a1a;margin-bottom:8px;">
      <span>Score: <b id="twScore">0</b></span>
      <span>Temps: <b id="twTime">30</b>s</span>
    </div>
    <div id="twGrid" style="display:grid;grid-template-columns:repeat(3,80px);grid-template-rows:repeat(3,80px);gap:8px;justify-content:center;"></div>
    <div id="twMsg" style="text-align:center;color:#fff;font-family:monospace;font-size:12px;margin-top:10px;min-height:16px;"></div>
    <div style="text-align:center;margin-top:6px;"><button id="twStart" style="padding:4px 14px;font-family:monospace;cursor:pointer;border:2px outset #fff;background:#c0c0c0;">Démarrer</button></div>
  `;
  const grid = body.querySelector('#twGrid');
  const holes = [];
  for (let i = 0; i < 9; i++) {
    const h = document.createElement('div');
    h.style.cssText = 'background:radial-gradient(circle at 50% 30%, #2a1505 30%, #150a02 70%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;cursor:pointer;user-select:none;position:relative;overflow:hidden;box-shadow:inset 0 4px 8px rgba(0,0,0,0.6);';
    h.dataset.i = i;
    grid.appendChild(h);
    holes.push(h);
  }
  let score = 0, time = 30, running = false, popTimer = null, tickTimer = null, currentMole = -1;

  function start() {
    score = 0; time = 30; running = true; currentMole = -1;
    body.querySelector('#twScore').textContent = '0';
    body.querySelector('#twTime').textContent = '30';
    body.querySelector('#twMsg').textContent = '';
    body.querySelector('#twStart').disabled = true;
    holes.forEach(h => h.innerHTML = '');
    schedule();
    tickTimer = setInterval(() => {
      time--;
      body.querySelector('#twTime').textContent = time;
      if (time <= 0) end();
    }, 1000);
  }
  function schedule() {
    if (!running) return;
    if (currentMole !== -1) { holes[currentMole].innerHTML = ''; currentMole = -1; }
    currentMole = Math.floor(Math.random()*9);
    holes[currentMole].innerHTML = '<span style="font-size:42px;animation:pop 0.15s ease-out;">🦫</span>';
    const lifetime = 500 + Math.random()*900;
    popTimer = setTimeout(() => {
      if (currentMole !== -1) holes[currentMole].innerHTML = '';
      schedule();
    }, lifetime);
  }
  holes.forEach((h, i) => {
    h.onclick = () => {
      if (!running || currentMole !== i) return;
      score++;
      body.querySelector('#twScore').textContent = score;
      h.innerHTML = '<span style="font-size:38px;">💥</span>';
      currentMole = -1;
      clearTimeout(popTimer);
      setTimeout(schedule, 200);
    };
  });
  function end() {
    running = false;
    clearTimeout(popTimer);
    clearInterval(tickTimer);
    holes.forEach(h => h.innerHTML = '');
    body.querySelector('#twMsg').innerHTML = `★ Fini ! Score : <b>${score}</b>`;
    body.querySelector('#twStart').disabled = false;
    body.querySelector('#twStart').textContent = 'Rejouer';
  }
  body.querySelector('#twStart').onclick = start;

  makeWindow({ id: 'taupes', title: '🔨 Taupes', body, width: 320, height: 420,
    onClose: () => { clearTimeout(popTimer); clearInterval(tickTimer); }
  });
}

function openTerminal() {
  const body = document.createElement('div');
  body.style.cssText = 'background:#000;color:#ccc;font-family:Courier New,monospace;padding:8px;height:100%;overflow-y:auto;font-size:12px;';
  body.innerHTML = `
    <div id="termOut"></div>
    <div style="display:flex;">
      <span style="color:#0f0;">C:\\&gt;&nbsp;</span>
      <input id="termIn" style="flex:1;background:transparent;border:0;color:#ccc;font-family:monospace;font-size:12px;outline:none;">
    </div>
  `;
  const win = makeWindow({ id: 'terminal', title: 'C:\\COMMAND.COM', body, width: 460, height: 300 });
  const out = body.querySelector('#termOut');
  const inp = body.querySelector('#termIn');
  setTimeout(() => inp.focus(), 100);

  function print(t, color) {
    const d = document.createElement('div');
    d.textContent = t;
    if (color) d.style.color = color;
    out.appendChild(d);
    body.scrollTop = body.scrollHeight;
  }
  print('PC-OS [Version 3.1.4]');
  print('(C) 1999 PC-Corp. Tous droits réservés.');
  print('');

  inp.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const cmd = inp.value.trim();
    print('C:\\> ' + cmd, '#0f0');
    inp.value = '';
    const lc = cmd.toLowerCase();
    if (lc === '') return;
    if (lc === 'raptorreset') {
      // Restauration silencieuse - aucun message qui dévoile l'effet
      setWiped(false);
      renderDesktop();
      print('OK.', '#888');
      return;
    }
    if (lc === 'skip') {
      state.skipEnabled = !state.skipEnabled;
      print('skip: ' + (state.skipEnabled ? 'ON' : 'OFF'), '#888');
      return;
    }
    if (lc === 'help' || lc === '?') {
      print('Commandes disponibles:');
      print('  dir, cls, ver, date, time, echo, whoami, exit');
      return;
    }
    if (lc === 'cls' || lc === 'clear') { out.innerHTML = ''; return; }
    if (lc === 'ver') { print('PC-OS v3.1.4'); return; }
    if (lc === 'whoami') { print('lazaro'); return; }
    if (lc === 'date') { print(new Date().toLocaleDateString()); return; }
    if (lc === 'time') { print(new Date().toLocaleTimeString()); return; }
    if (lc === 'dir') {
      print(' Répertoire de C:\\');
      print('');
      print(' README   TXT       128  01/01/1999');
      print(' CONFIG   SYS        64  01/01/1999');
      print(' COMMAND  COM     16384  01/01/1999');
      print(' USER     DIR       <DIR>');
      print('');
      print('        4 fichier(s)');
      return;
    }
    if (lc.startsWith('echo ')) { print(cmd.slice(5)); return; }
    if (lc === 'exit') { win.querySelector('[data-action="close"]').click(); return; }
    print(`Commande ou nom de fichier incorrect: ${cmd}`, '#f55');
  });
}

function openMessenger() {
  const body = document.createElement('div');
  body.className = 'messenger';
  body.innerHTML = `
    <div class="msg-sidebar">
      <div class="msg-header">▸ CONTACTS</div>
      <div id="chatList"></div>
    </div>
    <div class="msg-main">
      <div class="msg-chat-header" id="chatHeader">— Aucun chat sélectionné —</div>
      <div class="msg-messages" id="chatMessages">
        <div class="msg-empty">Sélectionne un contact à gauche.<br>Une vérification d'identité sera requise.</div>
      </div>
    </div>
  `;
  const win = makeWindow({
    id: 'darknet', title: '☠ DarkNet Messenger',
    body, width: 640, height: 460, darknet: true
  });

  const list = body.querySelector('#chatList');
  function renderList() {
    list.innerHTML = '';
    CHATS.forEach(c => {
      const it = document.createElement('div');
      it.className = 'chat-item' + (state.chatsUnlocked[c.id] ? '' : ' chat-locked');
      it.innerHTML = `<div class="chat-name">${c.name}</div><div class="chat-preview">${c.preview}</div>`;
      it.onclick = () => {
        if (state.chatsUnlocked[c.id]) {
          renderChat(c);
        } else {
          startSequenceMinigame(body, () => {
            state.chatsUnlocked[c.id] = true;
            renderList();
            renderChat(c);
          });
        }
      };
      list.appendChild(it);
    });
  }
  renderList();

  function renderChat(c) {
    body.querySelector('#chatHeader').textContent = '▸ ' + c.name;
    const cm = body.querySelector('#chatMessages');
    cm.innerHTML = '';
    c.messages.forEach(m => {
      const b = document.createElement('div');
      b.className = 'msg-bubble ' + m.who;
      let html = `<div class="author">${m.name}</div>`;
      if (m.text) html += escapeHtml(m.text);
      b.innerHTML = html;
      if (m.image) {
        const span = document.createElement('span');
        span.className = 'msg-img-attached';
        span.textContent = '📎 [pièce-jointe : image.jpg]';
        const imgData = m.image; // capture in closure
        span.onclick = () => startPatternMinigame(body, () => openImage(imgData));
        const wrap = document.createElement('div');
        wrap.appendChild(span);
        b.appendChild(wrap);
      }
      cm.appendChild(b);
    });
    cm.scrollTop = cm.scrollHeight;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

/* ===========================================================
   MINIJEU 1 : Séquence de codes hex (pour ouvrir un chat)
   =========================================================== */
function startSequenceMinigame(parentBody, onSuccess) {
  // pick 4 distinct hex
  const allCodes = [];
  for (let i = 0; i < 25; i++) {
    let c;
    do {
      c = Math.floor(Math.random()*256).toString(16).toUpperCase().padStart(2,'0');
    } while (allCodes.includes(c));
    allCodes.push(c);
  }
  const target = [];
  while (target.length < 4) {
    const c = allCodes[Math.floor(Math.random()*allCodes.length)];
    if (!target.includes(c)) target.push(c);
  }

  const overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  overlay.innerHTML = `
    <div class="mg-title">DÉCRYPTAGE — PROTOCOLE SAHP</div>
    <div class="mg-subtitle">CLIQUEZ LES CODES DANS L'ORDRE INDIQUÉ</div>
    <div class="mg-time-label" id="mgTime">15.0s</div>
    <div class="mg-time"><div class="mg-time-bar" id="mgBar"></div></div>
    <div class="mg-target">
      <div class="mg-target-title">SÉQUENCE CIBLE</div>
      <div class="mg-sequence" id="mgSeq"></div>
    </div>
    <div class="mg-grid" id="mgGrid"></div>
    ${state.skipEnabled ? '<button class="mg-skip-btn" id="mgSkip">▸ SKIP</button>' : ''}
  `;
  parentBody.appendChild(overlay);
  if (state.skipEnabled) {
    overlay.querySelector('#mgSkip').onclick = () => {
      alive = false;
      clearInterval(timerInt);
      overlay.remove();
      onSuccess();
    };
  }

  const seqBox = overlay.querySelector('#mgSeq');
  target.forEach((t, i) => {
    if (i) { const a = document.createElement('span'); a.className = 'mg-seq-arrow'; a.textContent = '▸'; seqBox.appendChild(a); }
    const c = document.createElement('span'); c.className = 'mg-seq-cell'; c.textContent = t; c.dataset.idx = i;
    seqBox.appendChild(c);
  });
  seqBox.querySelector('[data-idx="0"]').classList.add('next');

  const grid = overlay.querySelector('#mgGrid');
  allCodes.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'mg-cell';
    cell.textContent = c;
    cell.onclick = () => clickCell(cell, c);
    grid.appendChild(cell);
  });

  let idx = 0;
  let alive = true;

  function clickCell(cell, val) {
    if (!alive) return;
    if (val === target[idx]) {
      cell.classList.add('correct');
      cell.style.pointerEvents = 'none';
      seqBox.querySelector(`[data-idx="${idx}"]`).classList.remove('next');
      seqBox.querySelector(`[data-idx="${idx}"]`).classList.add('done');
      idx++;
      if (idx >= target.length) {
        alive = false;
        clearInterval(timerInt);
        setTimeout(() => { overlay.remove(); onSuccess(); }, 250);
      } else {
        seqBox.querySelector(`[data-idx="${idx}"]`).classList.add('next');
      }
    } else {
      cell.classList.add('wrong');
      alive = false;
      clearInterval(timerInt);
      fullReset('SÉQUENCE INVALIDE — RÉINITIALISATION');
    }
  }

  // timer
  const start = Date.now();
  const total = 15000;
  const bar = overlay.querySelector('#mgBar');
  const tlab = overlay.querySelector('#mgTime');
  const timerInt = setInterval(() => {
    const elapsed = Date.now() - start;
    const rem = Math.max(0, total - elapsed);
    bar.style.width = (rem/total*100) + '%';
    tlab.textContent = (rem/1000).toFixed(1) + 's';
    if (rem <= 0) {
      alive = false;
      clearInterval(timerInt);
      fullReset('TEMPS ÉCOULÉ — RÉINITIALISATION');
    }
  }, 80);
}

/* ===========================================================
   MINIJEU 2 : Pattern Memory (pour ouvrir l'image)
   =========================================================== */
function startPatternMinigame(parentBody, onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  overlay.innerHTML = `
    <div class="mg-title">SCAN BIOMÉTRIQUE</div>
    <div class="mg-subtitle">RÉPÉTEZ LA SÉQUENCE LUMINEUSE</div>
    <div class="mg-time-label" id="patTime">15.0s</div>
    <div class="mg-time"><div class="mg-time-bar" id="patBar"></div></div>
    <div class="pat-grid" id="patGrid"></div>
    <div id="patStatus" style="margin-top:10px; color:#0ff; font-size:11px; letter-spacing:2px;">MÉMORISEZ...</div>
    ${state.skipEnabled ? '<button class="mg-skip-btn" id="patSkip">▸ SKIP</button>' : ''}
  `;
  parentBody.appendChild(overlay);
  if (state.skipEnabled) {
    overlay.querySelector('#patSkip').onclick = () => {
      alive = false;
      if (timerInt) clearInterval(timerInt);
      clearInterval(playInt);
      overlay.remove();
      onSuccess();
    };
  }

  const grid = overlay.querySelector('#patGrid');
  const cells = [];
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.className = 'pat-cell disabled';
    c.dataset.i = i;
    grid.appendChild(c);
    cells.push(c);
  }

  // generate sequence of 4
  const seq = [];
  while (seq.length < 4) {
    const r = Math.floor(Math.random()*9);
    if (seq[seq.length-1] !== r) seq.push(r);
  }

  let alive = true;
  let pos = 0;
  let timerStarted = false;
  let timerInt = null;

  // play sequence
  let p = 0;
  const playInt = setInterval(() => {
    if (p >= seq.length) {
      clearInterval(playInt);
      overlay.querySelector('#patStatus').textContent = 'À VOTRE TOUR';
      cells.forEach(c => c.classList.remove('disabled'));
      startTimer();
      return;
    }
    const cell = cells[seq[p]];
    cell.classList.add('flash');
    setTimeout(() => cell.classList.remove('flash'), 380);
    p++;
  }, 600);

  function startTimer() {
    timerStarted = true;
    const start = Date.now();
    const total = 15000;
    const bar = overlay.querySelector('#patBar');
    const tlab = overlay.querySelector('#patTime');
    timerInt = setInterval(() => {
      const elapsed = Date.now() - start;
      const rem = Math.max(0, total - elapsed);
      bar.style.width = (rem/total*100) + '%';
      tlab.textContent = (rem/1000).toFixed(1) + 's';
      if (rem <= 0) {
        alive = false;
        clearInterval(timerInt);
        fullReset('TEMPS ÉCOULÉ — RÉINITIALISATION');
      }
    }, 80);
  }

  cells.forEach(c => {
    c.onclick = () => {
      if (!alive || !timerStarted) return;
      const i = parseInt(c.dataset.i);
      if (i === seq[pos]) {
        c.classList.add('you-clicked');
        setTimeout(() => c.classList.remove('you-clicked'), 250);
        pos++;
        if (pos >= seq.length) {
          alive = false;
          clearInterval(timerInt);
          setTimeout(() => { overlay.remove(); onSuccess(); }, 300);
        }
      } else {
        alive = false;
        clearInterval(timerInt);
        c.style.background = '#400';
        fullReset('SÉQUENCE INVALIDE — RÉINITIALISATION');
      }
    };
  });
}

function startWipeTimer() {
  state.wipeRemaining = 60;
  const ext = document.getElementById('external-timer');
  const val = document.getElementById('external-timer-val');
  ext.style.display = 'block';
  val.textContent = state.wipeRemaining;
  state.wipeTimer = setInterval(() => {
    state.wipeRemaining--;
    val.textContent = state.wipeRemaining;
    if (state.wipeRemaining <= 0) {
      clearInterval(state.wipeTimer);
      state.wipeTimer = null;
      ext.style.display = 'none';
      doWipe();
    }
  }, 1000);
}

      clearInterval(inter);
      setTimeout(() => {
        win.remove();

        setWiped(true);

function fullReset(reason) {
  showFlash(reason || 'RÉINITIALISATION');
  state.darknetUnlocked = false;
  state.chatsUnlocked = {};
  state.imageViewed = false;
  state.wipeRemaining = 60;
  if (state.wipeTimer) { clearInterval(state.wipeTimer); state.wipeTimer = null; }
  document.getElementById('external-timer').style.display = 'none';

  // close all darknet & image windows
  Object.entries({...state.windows}).forEach(([id, w]) => {
    if (w.classList.contains('darknet-window') || id.startsWith('imgview_')) {
      w.remove();
      delete state.windows[id];
    }
  });
  renderTaskbar();
}

</script>
</body>
</html>
