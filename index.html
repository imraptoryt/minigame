<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PC-9000</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: radial-gradient(ellipse at center, #2a2a2a, #0a0a0a);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Bannière auto-effacement, en haut de l'écran, par-dessus tout */
  #external-timer {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0;
    background: #1a0000;
    color: #ff3030;
    padding: 8px 20px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    border-bottom: 2px solid #800;
    box-shadow: 0 4px 16px rgba(255,0,0,0.5);
    letter-spacing: 3px;
    text-shadow: 0 0 6px #ff3030;
    text-align: center;
    z-index: 99990;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* PC frame */
  #pc-frame {
    width: 1040px; height: 720px;
    background: linear-gradient(180deg, #e8e0cb, #b5ad97);
    border-radius: 22px;
    padding: 28px;
    box-shadow:
      inset 0 0 30px rgba(0,0,0,0.25),
      0 30px 60px rgba(0,0,0,0.7),
      0 0 0 4px #918a76;
    position: relative;
  }
  #pc-frame::before {
    content: 'PC-9000';
    position: absolute;
    bottom: 6px; left: 28px;
    font-size: 11px;
    color: #5a5444;
    letter-spacing: 3px;
    font-weight: bold;
  }
  #pc-frame::after {
    content: '';
    position: absolute;
    bottom: 12px; right: 28px;
    width: 12px; height: 12px;
    background: #4caf50;
    border-radius: 50%;
    box-shadow: 0 0 10px #4caf50;
    animation: led-blink 3s infinite;
  }
  @keyframes led-blink { 0%, 95% { opacity: 1; } 97% { opacity: 0.3; } }

  /* Screen */
  #screen {
    width: 100%; height: 100%;
    background: #008080;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.6);
  }
  #screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px,
      transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 99999;
  }
  #screen::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 99998;
  }

  #desktop {
    position: absolute;
    inset: 0;
    padding: 14px;
    z-index: 1;
  }

  .desktop-icon {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    width: 78px;
    margin: 8px;
    cursor: pointer;
    color: white;
    font-size: 11px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
    text-align: center;
    padding: 4px;
    border: 1px dotted transparent;
    user-select: none;
  }
  .desktop-icon:active { border: 1px dotted white; background: rgba(0,0,128,0.3); }
  .desktop-icon .ico {
    width: 44px; height: 44px;
    margin-bottom: 4px;
    background: #c0c0c0;
    border: 1px solid #fff;
    border-right-color: #404040;
    border-bottom-color: #404040;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    image-rendering: pixelated;
  }

  /* Windows */
  .window {
    position: absolute;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    min-width: 300px;
    min-height: 200px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .window.maximized {
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: calc(100% - 32px) !important;
    border-radius: 0;
  }
  .window-title {
    background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
    color: white;
    padding: 3px 4px 3px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    font-weight: bold;
    cursor: move;
    user-select: none;
    height: 22px;
    flex-shrink: 0;
  }
  .window-title.inactive { background: linear-gradient(90deg, #808080, #b0b0b0); }
  .window-controls button {
    width: 18px; height: 16px;
    background: #c0c0c0;
    border: 1px solid;
    border-color: #fff #404040 #404040 #fff;
    font-size: 9px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 2px;
    padding: 0;
    color: #000;
    line-height: 1;
  }
  .window-controls button:active {
    border-color: #404040 #fff #fff #404040;
  }
  .window-body {
    flex: 1;
    background: #c0c0c0;
    overflow: auto;
    position: relative;
    padding: 4px;
  }
  .window-resize {
    position: absolute;
    width: 14px; height: 14px;
    bottom: 0; right: 0;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, #888 52%, #888 62%, transparent 64%, #888 72%, #888 82%, transparent 84%);
    z-index: 10;
  }

  /* Taskbar */
  #taskbar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 28px;
    background: #c0c0c0;
    border-top: 2px solid #fff;
    display: flex;
    align-items: center;
    padding: 2px 4px;
    z-index: 9000;
    gap: 4px;
  }
  .start-button {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    padding: 1px 8px;
    font-weight: bold;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
  }
  .start-button:active {
    border-color: #404040 #fff #fff #404040;
  }
  #taskbar-items {
    display: flex;
    gap: 3px;
    flex: 1;
    overflow: hidden;
  }
  .taskbar-item {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    padding: 1px 8px;
    font-size: 10px;
    cursor: pointer;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Courier New', monospace;
  }
  .taskbar-item.active {
    border-color: #404040 #fff #fff #404040;
    background: #a0a0a0;
  }
  #taskbar-clock {
    border: 1px solid;
    border-color: #404040 #fff #fff #404040;
    padding: 2px 8px;
    font-size: 11px;
  }

  /* Generic content */
  .pad { padding: 10px; }
  h3.app-title { margin: 0 0 8px 0; font-size: 13px; }

  /* Notes */
  .notes-area {
    width: 100%; height: 100%;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    background: white;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 8px;
    resize: none;
    outline: none;
  }

  /* Calculator */
  .calc { padding: 8px; font-family: 'Courier New', monospace; }
  .calc-display {
    background: #aabb88; color: #000;
    padding: 6px 10px;
    text-align: right;
    font-size: 20px;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    margin-bottom: 8px;
    min-height: 24px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .calc-grid button {
    padding: 10px;
    font-size: 14px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #404040 #404040 #fff;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }
  .calc-grid button:active {
    border-color: #404040 #fff #fff #404040;
  }

  /* Snake */
  .snake-info {
    display: flex; justify-content: space-between;
    padding: 6px 8px;
    background: #000080; color: white;
    font-size: 12px;
    font-weight: bold;
  }
  .snake-canvas-wrap {
    display: flex; justify-content: center; align-items: center;
    background: #001;
    padding: 8px;
  }
  #snakeCanvas {
    background: #000;
    border: 2px solid #404040;
    image-rendering: pixelated;
  }

  /* Files */
  .files-list {
    background: white;
    border: 2px solid;
    border-color: #404040 #fff #fff #404040;
    padding: 4px;
    height: calc(100% - 8px);
    overflow-y: auto;
    font-size: 12px;
  }
  .file-row {
    display: flex; align-items: center;
    gap: 8px;
    padding: 4px;
    cursor: pointer;
  }
  .file-row:hover { background: #000080; color: white; }

  /* Darknet */
  .darknet-window .window-title {
    background: linear-gradient(90deg, #200, #800) !important;
  }
  .darknet-window .window-body {
    background: #000 !important;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 0;
  }

  /* Darknet lock screen */
  .dn-lock {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .dn-lock h2 {
    color: #f00;
    text-shadow: 0 0 8px #f00;
    letter-spacing: 4px;
    margin: 8px 0 16px;
    font-size: 18px;
  }
  .dn-lock-ascii {
    color: #c00;
    font-size: 9px;
    line-height: 1.0;
    letter-spacing: -0.5px;
    white-space: pre;
    font-family: 'Courier New', Consolas, monospace;
    font-weight: bold;
    text-shadow:
      0 0 4px #f00,
      0 0 10px rgba(255,0,0,0.6);
    margin-bottom: 16px;
    animation: lock-pulse 2s infinite alternate;
  }
  @keyframes lock-pulse {
    from { text-shadow: 0 0 3px #f00, 0 0 8px rgba(255,0,0,0.5); filter: brightness(0.9); }
    to { text-shadow: 0 0 6px #f00, 0 0 16px rgba(255,0,0,0.8); filter: brightness(1.1); }
  }
  .dn-input {
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    width: 180px;
  }
  .dn-submit {
    margin-top: 14px;
    background: #0a0a0a;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 6px 16px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 2px;
  }
  .dn-submit:hover { background: #030; }
  .dn-error {
    color: #f00; margin-top: 10px;
    font-size: 12px;
    height: 16px;
  }

  /* Skull loading */
  .skull-loading {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 20px;
    overflow: hidden;
  }
  .skull-art {
    color: #0f0;
    font-size: 10px;
    line-height: 1.0;
    letter-spacing: -0.5px;
    white-space: pre;
    font-family: 'Courier New', Consolas, monospace;
    text-shadow:
      0 0 4px #0f0,
      0 0 10px #0f0,
      0 0 20px rgba(0,255,0,0.5);
    animation: skull-glow 1.8s infinite alternate;
    font-weight: bold;
  }
  @keyframes skull-glow {
    from {
      text-shadow: 0 0 3px #0f0, 0 0 8px #0f0, 0 0 16px rgba(0,255,0,0.4);
      transform: scale(1);
      filter: brightness(0.9);
    }
    to {
      text-shadow: 0 0 6px #0f0, 0 0 16px #0f0, 0 0 32px rgba(0,255,0,0.7);
      transform: scale(1.03);
      filter: brightness(1.15);
    }
  }
  .skull-text {
    margin-top: 16px;
    font-size: 12px;
    color: #0f0;
    min-height: 80px;
    width: 80%;
    text-align: center;
  }
  .skull-text .line { opacity: 0; animation: fadein 0.3s forwards; }
  @keyframes fadein { to { opacity: 1; } }
  .cursor { animation: blink 0.8s infinite; }

  /* Wipe skull */
  .skull-art.evil {
    color: #ff2020;
    text-shadow:
      0 0 4px #f00,
      0 0 12px #f00,
      0 0 24px rgba(255,0,0,0.6);
    animation: skull-evil 0.5s infinite alternate;
  }
  @keyframes skull-evil {
    from {
      text-shadow: 0 0 4px #f00, 0 0 10px #f00, 0 0 20px rgba(255,0,0,0.5);
      transform: scale(1) rotate(-0.5deg);
      filter: brightness(1) hue-rotate(0deg);
    }
    to {
      text-shadow: 0 0 8px #f00, 0 0 22px #f00, 0 0 40px rgba(255,0,0,0.9);
      transform: scale(1.06) rotate(0.5deg);
      filter: brightness(1.3) hue-rotate(-10deg);
    }
  }
  .data-stream {
    color: #f00;
    font-size: 10px;
    white-space: pre;
    margin-top: 10px;
    max-height: 120px;
    overflow: hidden;
    width: 90%;
    text-align: left;
    font-family: 'Courier New', monospace;
  }

  /* Messenger */
  .messenger { display: flex; height: 100%; background: #1a1a1a; color: #0f0; }
  .msg-sidebar {
    width: 180px;
    background: #0d0d0d;
    border-right: 1px solid #0f0;
    overflow-y: auto;
  }
  .msg-header {
    background: #200;
    padding: 6px 10px;
    color: #f55;
    font-weight: bold;
    font-size: 11px;
    border-bottom: 1px solid #800;
    letter-spacing: 2px;
  }
  .chat-item {
    padding: 8px 10px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    font-size: 12px;
  }
  .chat-item:hover { background: #1a1a1a; }
  .chat-item.active { background: #002000; }
  .chat-name { color: #0f0; font-weight: bold; }
  .chat-preview {
    color: #555;
    font-size: 10px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-locked::after { content: ' 🔒'; }
  .msg-main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
  .msg-chat-header {
    background: #200;
    padding: 6px 12px;
    font-size: 12px;
    color: #f55;
    border-bottom: 1px solid #800;
  }
  .msg-messages {
    flex: 1; overflow-y: auto;
    padding: 10px;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg-empty {
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #555;
    font-size: 11px;
    text-align: center;
  }
  .msg-bubble {
    margin-bottom: 8px;
    max-width: 75%;
    padding: 6px 10px;
    border-radius: 4px;
    word-wrap: break-word;
  }
  .msg-bubble.them { background: #1a1a1a; color: #0f0; }
  .msg-bubble.me { background: #002000; color: #afa; margin-left: auto; text-align: right; }
  .msg-bubble .author { font-size: 10px; color: #888; margin-bottom: 2px; }
  .msg-img-attached {
    display: inline-block;
    padding: 12px 18px;
    border: 1px dashed #0f0;
    cursor: pointer;
    color: #0f0;
    background: #001000;
    margin-top: 4px;
  }
  .msg-img-attached:hover { background: #002000; }

  /* Minigame overlay */
  .minigame-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 14px;
  }
  .mg-title {
    color: #0ff;
    font-size: 14px;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .mg-subtitle {
    font-size: 10px;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .mg-time {
    width: 80%;
    height: 4px;
    background: #001a00;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .mg-time-bar {
    height: 100%;
    background: #0ff;
    width: 100%;
    transition: width 0.1s linear;
  }
  .mg-time-label {
    color: #0ff;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .mg-target {
    background: #0a0a18;
    border: 1px solid #064;
    padding: 8px 14px;
    margin-bottom: 10px;
  }
  .mg-target-title {
    font-size: 10px;
    color: #088;
    letter-spacing: 3px;
    margin-bottom: 4px;
    text-align: center;
  }
  .mg-sequence {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }
  .mg-seq-cell {
    background: #050a14;
    border: 1px solid #1a3a5a;
    padding: 4px 10px;
    color: #0ff;
    font-size: 14px;
    min-width: 38px;
    text-align: center;
    font-weight: bold;
  }
  .mg-seq-cell.next {
    border-color: #0ff;
    box-shadow: 0 0 8px #0ff;
  }
  .mg-seq-cell.done {
    background: #002a14;
    color: #4f0;
    border-color: #084;
  }
  .mg-seq-arrow { color: #444; }
  .mg-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    max-width: 360px;
    width: 100%;
  }
  .mg-cell {
    background: #0a0a18;
    border: 1px solid #1a3a5a;
    padding: 8px 4px;
    color: #aef;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    font-family: 'Courier New', monospace;
    transition: all 0.08s;
  }
  .mg-cell:hover { background: #14143a; }
  .mg-cell.wrong { background: #400; border-color: #f00; }
  .mg-cell.correct { background: #040; border-color: #0f0; }

  /* Bouton Skip (activé via commande cachée du terminal) */
  .mg-skip-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: #2a0a0a;
    color: #ff8888;
    border: 1px solid #ff5555;
    padding: 5px 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    z-index: 10;
  }
  .mg-skip-btn:hover { background: #4a1a1a; color: #ffcccc; }

  /* Pattern minigame */
  .pat-grid {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 6px;
    margin-top: 10px;
  }
  .pat-cell {
    width: 60px; height: 60px;
    background: #050a14;
    border: 1px solid #1a3a5a;
    cursor: pointer;
    transition: all 0.1s;
  }
  .pat-cell.flash {
    background: #0ff;
    box-shadow: 0 0 16px #0ff;
  }
  .pat-cell.you-clicked { background: #0a0; }
  .pat-cell.disabled { opacity: 0.5; pointer-events: none; }

  /* Image viewer */
  .img-viewer {
    height: 100%;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    padding: 8px;
  }
  .img-viewer img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border: 1px solid #0f0;
  }
  .img-placeholder {
    color: #0f0;
    text-align: center;
    font-family: 'Courier New', monospace;
    padding: 20px;
    border: 1px dashed #0f0;
  }

  /* Flash message */
  #flash-msg {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #200;
    color: #f55;
    padding: 20px 40px;
    border: 2px solid #f00;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    z-index: 99999;
    letter-spacing: 3px;
    box-shadow: 0 0 40px rgba(255,0,0,0.7);
    text-align: center;
    animation: shake 0.3s;
  }
  @keyframes shake {
    0%, 100% { transform: translate(-50%, -50%); }
    25% { transform: translate(-52%, -48%); }
    75% { transform: translate(-48%, -52%); }
  }
</style>
</head>
<body>

<div id="pc-frame">
  <div id="screen">
    <div id="external-timer">⚠ AUTO-EFFACEMENT EN COURS: <span id="external-timer-val">60</span>s ⚠</div>
    <div id="desktop"></div>
    <div id="windows-container"></div>
    <div id="flash-msg"></div>
    <div id="taskbar">
      <button class="start-button">⊞ Démarrer</button>
      <div id="taskbar-items"></div>
      <div id="taskbar-clock">--:--</div>
    </div>
  </div>
</div>

<script>
/* ===========================================================
   ÉTAT GLOBAL
   =========================================================== */
const state = {
  darknetUnlocked: false,
  chatsUnlocked: {},     // chatId -> true
  imageViewed: false,
  wipeTimer: null,
  wipeRemaining: 60,
  zIndex: 100,
  windows: {},           // id -> element
  activeWindow: null,
  skipEnabled: false,    // activable via la commande cachée "skip"
};

const DARKNET_CODE = '4271'; // ← code caché dans Notes

/* ===========================================================
   PERSISTANCE (wipe)
   =========================================================== */
function isWiped() { return localStorage.getItem('dn_wiped') === '1'; }
function setWiped(v) {

/* ===========================================================
   SYSTÈME DE FENÊTRES
   =========================================================== */
function makeWindow({ id, title, body, width = 520, height = 380, x, y, darknet = false, onClose = null }) {
  if (state.windows[id]) {
    focusWindow(state.windows[id]);
    return state.windows[id];
  }
  const win = document.createElement('div');
  win.className = 'window' + (darknet ? ' darknet-window' : '');
  win.dataset.id = id;
  win.style.width = width + 'px';
  win.style.height = height + 'px';
  if (x === undefined) x = 60 + Math.random() * 80;
  if (y === undefined) y = 30 + Math.random() * 60;
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.zIndex = ++state.zIndex;

  win.innerHTML = `
    <div class="window-title">
      <span>${title}</span>
      <div class="window-controls">
        <button data-action="min">_</button>
        <button data-action="max">▢</button>
        <button data-action="close">✕</button>
      </div>
    </div>
    <div class="window-body"></div>
    <div class="window-resize"></div>
  `;
  win.querySelector('.window-body').appendChild(body);

  // Title drag
  const titleBar = win.querySelector('.window-title');
  let dragOffset = null;
  titleBar.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    if (win.classList.contains('maximized')) return;
    focusWindow(win);
    const rect = win.getBoundingClientRect();
    const containerRect = document.getElementById('screen').getBoundingClientRect();
    dragOffset = {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top,
      cx: containerRect.left,
      cy: containerRect.top
    };
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragOffset || !win.parentElement) return;
    const nx = Math.max(0, e.clientX - dragOffset.x - dragOffset.cx);
    const ny = Math.max(0, e.clientY - dragOffset.y - dragOffset.cy);
    win.style.left = nx + 'px';
    win.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => { dragOffset = null; });

  // Resize
  const resize = win.querySelector('.window-resize');
  let resizing = null;
  resize.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    if (win.classList.contains('maximized')) return;
    resizing = { x: e.clientX, y: e.clientY, w: win.offsetWidth, h: win.offsetHeight };
  });
  document.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    win.style.width = Math.max(260, resizing.w + (e.clientX - resizing.x)) + 'px';
    win.style.height = Math.max(180, resizing.h + (e.clientY - resizing.y)) + 'px';
  });
  document.addEventListener('mouseup', () => { resizing = null; });

  // Controls
  win.querySelector('[data-action="close"]').onclick = () => {
    if (onClose) onClose();
    win.remove();
    delete state.windows[id];
    renderTaskbar();
  };
  win.querySelector('[data-action="max"]').onclick = () => {
    win.classList.toggle('maximized');
  };
  win.querySelector('[data-action="min"]').onclick = () => {
    win.style.display = 'none';
    renderTaskbar();
  };
  win.addEventListener('mousedown', () => focusWindow(win));

  document.getElementById('windows-container').appendChild(win);
  state.windows[id] = win;
  focusWindow(win);
  renderTaskbar();
  return win;
}

function focusWindow(win) {
  Object.values(state.windows).forEach(w => {
    w.querySelector('.window-title').classList.add('inactive');
  });
  win.querySelector('.window-title').classList.remove('inactive');
  win.style.zIndex = ++state.zIndex;
  win.style.display = '';
  state.activeWindow = win;
  renderTaskbar();
}

function renderTaskbar() {
  const tb = document.getElementById('taskbar-items');
  tb.innerHTML = '';
  Object.entries(state.windows).forEach(([id, win]) => {
    const item = document.createElement('div');
    item.className = 'taskbar-item' + (win === state.activeWindow && win.style.display !== 'none' ? ' active' : '');
    item.textContent = win.querySelector('.window-title span').textContent;
    item.onclick = () => {
      if (win.style.display === 'none') { win.style.display = ''; focusWindow(win); }
      else if (state.activeWindow === win) { win.style.display = 'none'; renderTaskbar(); }
      else { focusWindow(win); }
    };
    tb.appendChild(item);
  });
}

/* ===========================================================
   APP: CALCULATRICE
   =========================================================== */
function openCalc() {
  const body = document.createElement('div');
  body.className = 'calc';
  body.innerHTML = `
    <div class="calc-display" id="calcDisp">0</div>
    <div class="calc-grid">
      ${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+','C','±','%',''].map(k =>
        k === '' ? '<div></div>' : `<button data-k="${k}">${k}</button>`
      ).join('')}
    </div>
  `;
  let cur = '0', prev = null, op = null, replace = true;
  body.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      const k = b.dataset.k;
      const disp = body.querySelector('#calcDisp');
      if (k === 'C') { cur = '0'; prev = null; op = null; replace = true; }
      else if (k === '±') { cur = String(-parseFloat(cur)); }
      else if (k === '%') { cur = String(parseFloat(cur)/100); }
      else if ('+-*/'.includes(k)) {
        if (prev !== null && op && !replace) {
          cur = String(compute(parseFloat(prev), parseFloat(cur), op));
        }
        prev = cur; op = k; replace = true;
      }
      else if (k === '=') {
        if (prev !== null && op) {
          cur = String(compute(parseFloat(prev), parseFloat(cur), op));
          prev = null; op = null; replace = true;
        }
      }
      else {
        if (replace) { cur = (k === '.' ? '0.' : k); replace = false; }
        else { if (k === '.' && cur.includes('.')) return; cur += k; }
      }
      disp.textContent = cur;
    };
  });
  function compute(a, b, o) {
    if (o === '+') return a + b;
    if (o === '-') return a - b;
    if (o === '*') return a * b;
    if (o === '/') return b === 0 ? 'ERR' : a / b;
  }
  makeWindow({ id: 'calc', title: 'Calculatrice', body, width: 240, height: 320 });
}

function openSnake() {
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="snake-info">
      <span>Score: <span id="snakeScore">0</span></span>
      <span>Flèches ← ↑ ↓ →</span>
    </div>
    <div class="snake-canvas-wrap"><canvas id="snakeCanvas" width="320" height="320"></canvas></div>
  `;
  setTimeout(() => initSnake(body), 50);
  makeWindow({ id: 'snake', title: 'Snake', body, width: 360, height: 400, onClose: () => { if (window._snakeStop) window._snakeStop(); } });
}
function initSnake(container) {
  const c = container.querySelector('#snakeCanvas');
  const scoreEl = container.querySelector('#snakeScore');
  if (!c) return;
  const ctx = c.getContext('2d');
  const SIZE = 20, COLS = 16;
  let snake = [{x: 8, y: 8}];
  let dir = {x: 1, y: 0};
  let food = randFood();
  let score = 0, alive = true;
  function randFood() {
    while(true) {
      const f = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
      if (!snake.some(s => s.x===f.x && s.y===f.y)) return f;
    }
  }
  const key = (e) => {
    if (e.key === 'ArrowUp' && dir.y !== 1) dir = {x:0,y:-1};
    else if (e.key === 'ArrowDown' && dir.y !== -1) dir = {x:0,y:1};
    else if (e.key === 'ArrowLeft' && dir.x !== 1) dir = {x:-1,y:0};
    else if (e.key === 'ArrowRight' && dir.x !== -1) dir = {x:1,y:0};
  };
  document.addEventListener('keydown', key);
  const loop = setInterval(() => {
    if (!alive) return;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0||head.x>=COLS||head.y<0||head.y>=COLS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      alive = false;
      ctx.fillStyle = '#f00'; ctx.font = '20px monospace';
      ctx.fillText('GAME OVER', 90, 160);
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++; scoreEl.textContent = score; food = randFood();
    } else snake.pop();
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,320);
    ctx.fillStyle = '#0f0';
    snake.forEach(s => ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2));
    ctx.fillStyle = '#f00';
    ctx.fillRect(food.x*SIZE+2, food.y*SIZE+2, SIZE-4, SIZE-4);
  }, 130);
  window._snakeStop = () => { clearInterval(loop); document.removeEventListener('keydown', key); };
}

      b.onclick = () => {
        color = b.dataset.c;
        body.querySelectorAll('.pnt-color').forEach(x => x.style.border = '1px solid #404040');

        <span>${i+1}. ${tr.t}</span><span>${tr.d}</span>
      </div>`).join('')}
    </div>
  `;
  let idx = 0, playing = false, progress = 0, inter = null;

    idx = (i + tracks.length) % tracks.length;
    progress = 0;
    body.querySelector('#musTitle').textContent = tracks[idx].t;
    body.querySelector('#musTime').textContent = '0:00 / ' + tracks[idx].d;

    body.querySelector('#musPlay').textContent = playing ? '⏸' : '▶';

    { sym: '✦', color: '#00acc1', name: 'éclat' },
  ];
  const deck = [...shapes, ...shapes].sort(() => Math.random() - 0.5);
  let flipped = [], matched = 0, locked = false, moves = 0;

  const body = document.createElement('div');
  body.style.padding = '10px';
  body.style.background = '#c0c0c0';
  body.style.height = '100%';
  body.style.overflow = 'auto';
  body.innerHTML = `
    <div style="font-family:monospace;font-size:12px;margin-bottom:6px;">

    <div id="memGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;"></div>
    <div id="memMsg" style="margin-top:10px;font-family:monospace;font-size:11px;min-height:40px;"></div>
  `;
  const grid = body.querySelector('#memGrid');

  deck.forEach((s, i) => {
    const c = document.createElement('div');
    c.dataset.sym = s.sym;
    c.dataset.color = s.color;
    c.dataset.i = i;
    c.style.cssText = `
      height: 62px;
      background: linear-gradient(135deg, #1a3a8a, #000080);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: transparent;
      cursor: pointer;
      border: 2px outset #fff;
      user-select: none;
      transition: background 0.15s;

    c.innerHTML = '<span style="color:rgba(255,255,255,0.15);font-size:18px;">▨</span>';

    c.onclick = () => {
      if (locked || c.dataset.flipped === '1' || c.dataset.matched === '1') return;
      // Retourner
      c.style.background = '#fff';
      c.innerHTML = `<span style="color:${c.dataset.color};font-size:34px;text-shadow:1px 1px 2px rgba(0,0,0,0.2);">${c.dataset.sym}</span>`;
      c.dataset.flipped = '1';
      flipped.push(c);

      if (flipped.length === 2) {
        moves++;
        body.querySelector('#memMoves').textContent = moves;
        locked = true;
        const [a, b] = flipped;
        if (a.dataset.sym === b.dataset.sym) {
          // Match
          setTimeout(() => {
            a.dataset.matched = '1'; b.dataset.matched = '1';
            a.style.background = '#d4f8d4'; b.style.background = '#d4f8d4';
            a.style.borderColor = '#080';

              body.querySelector('#memMsg').innerHTML = `

                  <div style="font-size:9px;color:#666;margin-top:4px;">[ accès // protocole sahp ]</div>
                </div>
              `;
            }
          }, 350);
        } else {
          // Pas de match
          setTimeout(() => {
            a.style.background = 'linear-gradient(135deg, #1a3a8a, #000080)';
            b.style.background = 'linear-gradient(135deg, #1a3a8a, #000080)';
            a.innerHTML = '<span style="color:rgba(255,255,255,0.15);font-size:18px;">▨</span>';
            b.innerHTML = '<span style="color:rgba(255,255,255,0.15);font-size:18px;">▨</span>';
            a.dataset.flipped = ''; b.dataset.flipped = '';
            flipped = []; locked = false;
          }, 750);
        }
      }
    };
    grid.appendChild(c);
  });
  makeWindow({ id: 'memory', title: '🧠 Mémoire', body, width: 340, height: 400 });
}

   APP: TERMINAL (CACHÉ - non listé dans le bureau)
   Ouvert via Ctrl+Alt+T
   Accepte la commande secrète qui restaure le DarkNet.
   =========================================================== */
function openTerminal() {
  const body = document.createElement('div');
  body.style.cssText = 'background:#000;color:#ccc;font-family:Courier New,monospace;padding:8px;height:100%;overflow-y:auto;font-size:12px;';
  body.innerHTML = `
    <div id="termOut"></div>
    <div style="display:flex;">
      <span style="color:#0f0;">C:\\&gt;&nbsp;</span>
      <input id="termIn" style="flex:1;background:transparent;border:0;color:#ccc;font-family:monospace;font-size:12px;outline:none;">
    </div>
  `;
  const win = makeWindow({ id: 'terminal', title: 'C:\\COMMAND.COM', body, width: 460, height: 300 });
  const out = body.querySelector('#termOut');
  const inp = body.querySelector('#termIn');
  setTimeout(() => inp.focus(), 100);

  function print(t, color) {
    const d = document.createElement('div');
    d.textContent = t;
    if (color) d.style.color = color;
    out.appendChild(d);
    body.scrollTop = body.scrollHeight;
  }
  print('PC-OS [Version 3.1.4]');
  print('(C) 1999 PC-Corp. Tous droits réservés.');
  print('');

  inp.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const cmd = inp.value.trim();
    print('C:\\> ' + cmd, '#0f0');
    inp.value = '';
    const lc = cmd.toLowerCase();
    if (lc === '') return;
    if (lc === 'raptorreset') {
      // Restauration silencieuse - aucun message qui dévoile l'effet
      setWiped(false);
      renderDesktop();
      print('OK.', '#888');
      return;
    }
    if (lc === 'skip') {
      state.skipEnabled = !state.skipEnabled;
      print('skip: ' + (state.skipEnabled ? 'ON' : 'OFF'), '#888');
      return;
    }
    if (lc === 'help' || lc === '?') {
      print('Commandes disponibles:');
      print('  dir, cls, ver, date, time, echo, whoami, exit');
      return;
    }
    if (lc === 'cls' || lc === 'clear') { out.innerHTML = ''; return; }
    if (lc === 'ver') { print('PC-OS v3.1.4'); return; }
    if (lc === 'whoami') { print('lazaro'); return; }
    if (lc === 'date') { print(new Date().toLocaleDateString()); return; }
    if (lc === 'time') { print(new Date().toLocaleTimeString()); return; }
    if (lc === 'dir') {
      print(' Répertoire de C:\\');
      print('');
      print(' README   TXT       128  01/01/1999');
      print(' CONFIG   SYS        64  01/01/1999');
      print(' COMMAND  COM     16384  01/01/1999');
      print(' USER     DIR       <DIR>');
      print('');
      print('        4 fichier(s)');
      return;
    }
    if (lc.startsWith('echo ')) { print(cmd.slice(5)); return; }
    if (lc === 'exit') { win.querySelector('[data-action="close"]').click(); return; }
    print(`Commande ou nom de fichier incorrect: ${cmd}`, '#f55');
  });
}

    body.querySelector('#chatHeader').textContent = '▸ ' + c.name;

    cm.innerHTML = '';
    c.messages.forEach(m => {
      const b = document.createElement('div');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

/* ===========================================================

   =========================================================== */
function startSequenceMinigame(parentBody, onSuccess) {
  // pick 4 distinct hex
  const allCodes = [];
  for (let i = 0; i < 25; i++) {
    let c;
    do {
      c = Math.floor(Math.random()*256).toString(16).toUpperCase().padStart(2,'0');
    } while (allCodes.includes(c));
    allCodes.push(c);
  }
  const target = [];
  while (target.length < 4) {
    const c = allCodes[Math.floor(Math.random()*allCodes.length)];
    if (!target.includes(c)) target.push(c);
  }

  const overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  overlay.innerHTML = `
    <div class="mg-title">DÉCRYPTAGE — PROTOCOLE SAHP</div>

      <div class="mg-sequence" id="mgSeq"></div>
    </div>
    <div class="mg-grid" id="mgGrid"></div>
    ${state.skipEnabled ? '<button class="mg-skip-btn" id="mgSkip">▸ SKIP</button>' : ''}
  `;
  parentBody.appendChild(overlay);
  if (state.skipEnabled) {
    overlay.querySelector('#mgSkip').onclick = () => {
      alive = false;
      clearInterval(timerInt);
      overlay.remove();
      onSuccess();
    };
  }

  const seqBox = overlay.querySelector('#mgSeq');
  target.forEach((t, i) => {
    if (i) { const a = document.createElement('span'); a.className = 'mg-seq-arrow'; a.textContent = '▸'; seqBox.appendChild(a); }
    const c = document.createElement('span'); c.className = 'mg-seq-cell'; c.textContent = t; c.dataset.idx = i;
    seqBox.appendChild(c);
  });
  seqBox.querySelector('[data-idx="0"]').classList.add('next');

  const grid = overlay.querySelector('#mgGrid');
  allCodes.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'mg-cell';
    cell.textContent = c;
    cell.onclick = () => clickCell(cell, c);
    grid.appendChild(cell);
  });

  let idx = 0;
  let alive = true;

  function clickCell(cell, val) {
    if (!alive) return;
    if (val === target[idx]) {
      cell.classList.add('correct');
      cell.style.pointerEvents = 'none';
      seqBox.querySelector(`[data-idx="${idx}"]`).classList.remove('next');
      seqBox.querySelector(`[data-idx="${idx}"]`).classList.add('done');
      idx++;
      if (idx >= target.length) {
        alive = false;
        clearInterval(timerInt);
        setTimeout(() => { overlay.remove(); onSuccess(); }, 250);
      } else {
        seqBox.querySelector(`[data-idx="${idx}"]`).classList.add('next');
      }
    } else {
      cell.classList.add('wrong');
      alive = false;
      clearInterval(timerInt);
      fullReset('SÉQUENCE INVALIDE — RÉINITIALISATION');
    }
  }

  // timer
  const start = Date.now();
  const total = 15000;
  const bar = overlay.querySelector('#mgBar');
  const tlab = overlay.querySelector('#mgTime');
  const timerInt = setInterval(() => {
    const elapsed = Date.now() - start;
    const rem = Math.max(0, total - elapsed);
    bar.style.width = (rem/total*100) + '%';
    tlab.textContent = (rem/1000).toFixed(1) + 's';
    if (rem <= 0) {
      alive = false;
      clearInterval(timerInt);
      fullReset('TEMPS ÉCOULÉ — RÉINITIALISATION');
    }
  }, 80);
}

/* ===========================================================
   MINIJEU 2 : Pattern Memory (pour ouvrir l'image)
   =========================================================== */
function startPatternMinigame(parentBody, onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  overlay.innerHTML = `
    <div class="mg-title">SCAN BIOMÉTRIQUE</div>
    <div class="mg-subtitle">RÉPÉTEZ LA SÉQUENCE LUMINEUSE</div>
    <div class="mg-time-label" id="patTime">15.0s</div>
    <div class="mg-time"><div class="mg-time-bar" id="patBar"></div></div>
    <div class="pat-grid" id="patGrid"></div>
    <div id="patStatus" style="margin-top:10px; color:#0ff; font-size:11px; letter-spacing:2px;">MÉMORISEZ...</div>
    ${state.skipEnabled ? '<button class="mg-skip-btn" id="patSkip">▸ SKIP</button>' : ''}
  `;
  parentBody.appendChild(overlay);
  if (state.skipEnabled) {
    overlay.querySelector('#patSkip').onclick = () => {
      alive = false;
      if (timerInt) clearInterval(timerInt);
      clearInterval(playInt);
      overlay.remove();
      onSuccess();
    };
  }

  const grid = overlay.querySelector('#patGrid');
  const cells = [];
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.className = 'pat-cell disabled';
    c.dataset.i = i;
    grid.appendChild(c);
    cells.push(c);
  }

  // generate sequence of 4
  const seq = [];
  while (seq.length < 4) {
    const r = Math.floor(Math.random()*9);
    if (seq[seq.length-1] !== r) seq.push(r);
  }

  let alive = true;
  let pos = 0;
  let timerStarted = false;
  let timerInt = null;

  // play sequence
  let p = 0;
  const playInt = setInterval(() => {
    if (p >= seq.length) {
      clearInterval(playInt);
      overlay.querySelector('#patStatus').textContent = 'À VOTRE TOUR';
      cells.forEach(c => c.classList.remove('disabled'));
      startTimer();
      return;
    }
    const cell = cells[seq[p]];
    cell.classList.add('flash');
    setTimeout(() => cell.classList.remove('flash'), 380);
    p++;
  }, 600);

  function startTimer() {
    timerStarted = true;
    const start = Date.now();
    const total = 15000;
    const bar = overlay.querySelector('#patBar');
    const tlab = overlay.querySelector('#patTime');
    timerInt = setInterval(() => {
      const elapsed = Date.now() - start;
      const rem = Math.max(0, total - elapsed);
      bar.style.width = (rem/total*100) + '%';
      tlab.textContent = (rem/1000).toFixed(1) + 's';
      if (rem <= 0) {
        alive = false;
        clearInterval(timerInt);
        fullReset('TEMPS ÉCOULÉ — RÉINITIALISATION');
      }
    }, 80);
  }

  cells.forEach(c => {
    c.onclick = () => {
      if (!alive || !timerStarted) return;
      const i = parseInt(c.dataset.i);
      if (i === seq[pos]) {
        c.classList.add('you-clicked');
        setTimeout(() => c.classList.remove('you-clicked'), 250);
        pos++;
        if (pos >= seq.length) {
          alive = false;
          clearInterval(timerInt);
          setTimeout(() => { overlay.remove(); onSuccess(); }, 300);
        }
      } else {
        alive = false;
        clearInterval(timerInt);
        c.style.background = '#400';
        fullReset('SÉQUENCE INVALIDE — RÉINITIALISATION');
      }
    };
  });
}

/* ===========================================================
   OUVRIR L'IMAGE + LANCER LE TIMER 60s
   =========================================================== */
function openImage(src) {
  const body = document.createElement('div');
  body.style.height = '100%';
  body.innerHTML = `
    <div class="img-viewer">
      ${src === 'raptorremplacemoi'
        ? '<div class="img-placeholder">[ raptorremplacemoi ]<br><br>Remplace ce lien<br>dans le fichier HTML<br>par l\'URL de ton image.</div>'
        : `<img src="${src}" alt="image" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>Erreur de chargement<br>['+this.src+']</div>'">`
      }
    </div>
  `;
  makeWindow({ id: 'imgview_' + Date.now(), title: '☠ image.jpg', body, width: 480, height: 400, darknet: true });

  // start 60s wipe timer (only first time)
  if (!state.imageViewed) {
    state.imageViewed = true;
    startWipeTimer();
  }
}

/* ===========================================================
   TIMER 60s AU-DESSUS DU PC
   =========================================================== */
function startWipeTimer() {
  state.wipeRemaining = 60;
  const ext = document.getElementById('external-timer');
  const val = document.getElementById('external-timer-val');
  ext.style.display = 'block';
  val.textContent = state.wipeRemaining;
  state.wipeTimer = setInterval(() => {
    state.wipeRemaining--;
    val.textContent = state.wipeRemaining;
    if (state.wipeRemaining <= 0) {
      clearInterval(state.wipeTimer);
      state.wipeTimer = null;
      ext.style.display = 'none';
      doWipe();
    }
  }, 1000);
}

/* ===========================================================
   WIPE : crâne qui mange les données, puis l'appli disparaît
   =========================================================== */
function doWipe() {
  // close all darknet-related windows except keep one for animation
  Object.entries(state.windows).forEach(([id, w]) => {
    if (w.classList.contains('darknet-window')) {
      w.remove();
      delete state.windows[id];
    }
  });

  // open wipe window
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="skull-loading">
      <pre class="skull-art evil" id="evilSkull">${SKULL_BIG}</pre>
      <div class="skull-text" id="wipeText" style="color:#f55;"></div>
      <div class="data-stream" id="dataStream"></div>
    </div>
  `;
  const win = makeWindow({ id: 'darknet', title: '☠ EFFACEMENT', body, width: 520, height: 460, darknet: true });
  renderTaskbar();

  const wt = body.querySelector('#wipeText');
  const ds = body.querySelector('#dataStream');
  const phrases = [
    '> "J\'AI FAIM..."',
    '> Effacement des messages...',
    '> "MIAM MIAM MIAM..."',
    '> Effacement des images...',
    '> "DÉLICIEUX, TES SECRETS..."',
    '> Effacement des contacts...',
    '> "ENCOREEE..."',
    '> Effacement des logs...',
    '> "TOUT DISPARAÎT..."',
    '> EFFACEMENT TERMINÉ.',
  ];
  let i = 0;
  const inter = setInterval(() => {
    if (i >= phrases.length) {
      clearInterval(inter);
      setTimeout(() => {
        win.remove();
        delete state.windows.darknet;
        setWiped(true);
        renderDesktop();
        renderTaskbar();
      }, 1000);
      return;
    }
    const d = document.createElement('div');
    d.className = 'line';
    d.textContent = phrases[i];
    wt.appendChild(d);
    // ajoute du bruit de données
    let stream = '';
    for (let k = 0; k < 4; k++) {
      let row = '';
      for (let j = 0; j < 40; j++) {
        row += Math.random() > 0.5
          ? String.fromCharCode(33 + Math.floor(Math.random()*90))
          : ' ';
      }
      stream += row + '\n';
    }
    ds.textContent = stream;
    i++;
  }, 700);
}

/* ===========================================================
   RESET COMPLET (sur échec d'un minijeu)
   =========================================================== */
function fullReset(reason) {
  showFlash(reason || 'RÉINITIALISATION');
  state.darknetUnlocked = false;
  state.chatsUnlocked = {};
  state.imageViewed = false;
  state.wipeRemaining = 60;
  if (state.wipeTimer) { clearInterval(state.wipeTimer); state.wipeTimer = null; }
  document.getElementById('external-timer').style.display = 'none';

  // close all darknet & image windows
  Object.entries({...state.windows}).forEach(([id, w]) => {
    if (w.classList.contains('darknet-window') || id.startsWith('imgview_')) {
      w.remove();
      delete state.windows[id];
    }
  });
  renderTaskbar();
}
